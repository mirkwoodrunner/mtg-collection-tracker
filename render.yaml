services:
  - type: web
    name: mtg-tracker
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mtg-tracker-db
          property: connectionString
      - key: COLLECTION_PUBLIC_ID
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: mtg-tracker-db
    plan: free
    databaseName: mtg_tracker
